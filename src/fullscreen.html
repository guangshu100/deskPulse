<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EyeCare - 休息一下</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-color: #E8F4F8;
      --text-color: #333333;
      --accent-color: #4CAF50;
      --danger-color: #e53935;
      --warning-color: #ff6d00;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      transition: background 0.8s;
    }

    body.has-bg-image {
      color: var(--text-light);
    }

    .bg-image-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .bg-image-layer.loaded {
      opacity: 1;
    }

    .bg-loading {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 100;
      background: rgba(0, 0, 0, 0.6);
      color: white;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      display: none;
    }

    .bg-loading.show {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Severity-based body styling */
    body.severity-4 { --bg-color: #FFF3E0; }
    body.severity-5 { --bg-color: #FBE9E7; }

    .container {
      text-align: center;
      padding: 40px;
      max-width: 640px;
      width: 100%;
    }

    /* Eye health bar */
    .health-section {
      margin-bottom: 28px;
    }

    .health-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 14px;
      color: #666;
    }

    .health-label .health-emoji {
      font-size: 20px;
      transition: transform 0.3s;
    }

    .health-bar-track {
      width: 100%;
      height: 12px;
      background: rgba(0,0,0,0.08);
      border-radius: 6px;
      overflow: hidden;
    }

    .health-bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.5s ease, background 0.5s;
    }

    .health-bar-fill.green { background: linear-gradient(90deg, #66BB6A, #43A047); }
    .health-bar-fill.yellow { background: linear-gradient(90deg, #FFA726, #FB8C00); }
    .health-bar-fill.orange { background: linear-gradient(90deg, #FF7043, #E64A19); }
    .health-bar-fill.red { background: linear-gradient(90deg, #EF5350, #C62828); }
    .health-bar-fill.dark { background: linear-gradient(90deg, #B71C1C, #880E4F); }

    .health-detail {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }

    /* Main text */
    .main-text {
      font-size: 32px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-color);
      line-height: 1.3;
    }

    body.severity-5 .main-text {
      color: #B71C1C;
    }

    .sub-text {
      font-size: 16px;
      color: #666;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    /* Skip history panel */
    .skip-panel {
      background: rgba(0, 0, 0, 0.04);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      text-align: left;
      max-height: 180px;
      overflow-y: auto;
    }

    .skip-panel h3 {
      font-size: 14px;
      color: #888;
      margin-bottom: 10px;
      text-align: center;
    }

    .skip-list {
      list-style: none;
      padding: 0;
    }

    .skip-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      font-size: 13px;
      color: #555;
    }

    .skip-list li:last-child { border-bottom: none; }

    .skip-list .skip-time {
      font-weight: 600;
      color: #e65100;
      min-width: 50px;
    }

    .skip-list .skip-reason {
      flex: 1;
      text-align: center;
      color: #888;
      font-style: italic;
    }

    .skip-list .skip-lost {
      font-size: 12px;
      color: #999;
    }

    /* Damage bill */
    .damage-bill {
      background: rgba(229, 57, 53, 0.08);
      border: 1px solid rgba(229, 57, 53, 0.2);
      border-radius: 12px;
      padding: 14px 20px;
      margin-bottom: 20px;
    }

    .damage-bill .damage-title {
      font-size: 14px;
      font-weight: 600;
      color: #c62828;
      margin-bottom: 8px;
    }

    .damage-bill .damage-stats {
      display: flex;
      justify-content: space-around;
      gap: 12px;
    }

    .damage-stat {
      text-align: center;
    }

    .damage-stat .damage-value {
      font-size: 20px;
      font-weight: 700;
      color: #c62828;
    }

    .damage-stat .damage-label {
      font-size: 11px;
      color: #999;
      margin-top: 2px;
    }

    /* Forced warning */
    .forced-warning {
      background: rgba(255, 152, 0, 0.15);
      border: 1px solid rgba(255, 152, 0, 0.4);
      border-radius: 12px;
      padding: 16px 24px;
      margin-bottom: 20px;
    }

    .forced-warning p:first-child {
      font-size: 16px;
      font-weight: 600;
      color: #e65100;
      margin-bottom: 4px;
    }

    .forced-warning p:last-child {
      font-size: 14px;
      color: #ff6d00;
    }

    /* Interaction guide */
    .interaction {
      margin-bottom: 32px;
    }

    .interaction-text {
      font-size: 18px;
      color: #555;
      animation: fadeInOut 10s ease-in-out infinite;
    }

    @keyframes fadeInOut {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Timer */
    .timer {
      font-size: 72px;
      font-weight: 300;
      color: var(--text-color);
      margin-bottom: 32px;
      font-variant-numeric: tabular-nums;
    }

    .timer span {
      font-size: 22px;
      color: #888;
      margin-left: 6px;
    }

    /* Close button */
    .close-btn {
      padding: 12px 36px;
      font-size: 16px;
      color: #666;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .close-btn:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.8);
      transform: scale(1.03);
    }

    .close-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .hint {
      position: fixed;
      bottom: 20px;
      font-size: 12px;
      color: #999;
    }

    .forced-countdown {
      font-size: 13px;
      color: #ff6d00;
      margin-top: 8px;
    }

    /* Responsive */
    @media (max-height: 600px) {
      .container { padding: 20px; }
      .main-text { font-size: 24px; }
      .timer { font-size: 56px; }
      .skip-panel { max-height: 120px; }
    }
  </style>
</head>
<body>
  <div class="bg-image-layer" id="bgImageLayer"></div>
  <div class="bg-loading" id="bgLoading"><div class="spinner"></div>正在加载绝美风景...</div>
  <div class="container">
    <!-- Eye Health Bar -->
    <div class="health-section" id="healthSection">
      <div class="health-label">
        <span id="healthEmoji">👁️</span>
        <span>眼睛生命值</span>
        <span id="healthPercent">100%</span>
      </div>
      <div class="health-bar-track">
        <div class="health-bar-fill green" id="healthBar" style="width:100%"></div>
      </div>
      <div class="health-detail" id="healthDetail">状态良好，继续保持！</div>
    </div>

    <div class="main-text" id="mainText">👁️ 让眼睛休息一下</div>
    <div class="sub-text" id="subText">远眺6米外的物体，睫状肌会放松哦～</div>

    <!-- Skip History Panel (shown when there are skip records) -->
    <div class="skip-panel" id="skipPanel" style="display:none;">
      <h3>📋 今日跳过记录</h3>
      <ul class="skip-list" id="skipList"></ul>
    </div>

    <!-- Damage Bill (shown at severity >= 3) -->
    <div class="damage-bill" id="damageBill" style="display:none;">
      <div class="damage-title">💰 你的眼睛账单</div>
      <div class="damage-stats">
        <div class="damage-stat">
          <div class="damage-value" id="damageSkippedTime">0分钟</div>
          <div class="damage-label">未休息时长</div>
        </div>
        <div class="damage-stat">
          <div class="damage-value" id="damageFatigue">0%</div>
          <div class="damage-label">睫状肌疲劳度</div>
        </div>
        <div class="damage-stat">
          <div class="damage-value" id="damageRecovery">5分钟</div>
          <div class="damage-label">建议休息时长</div>
        </div>
      </div>
    </div>

    <!-- Forced Warning -->
    <div class="forced-warning" id="forcedWarning" style="display:none;">
      <p>⚠️ 今日跳过次数已达上限</p>
      <p>请坚持休息保护眼睛哦～</p>
    </div>

    <div class="interaction">
      <div class="interaction-text" id="interactionText">👁️ 轻轻闭眼休息一下</div>
    </div>

    <div class="timer">
      <span id="countdown">30</span><span>秒</span>
    </div>

    <button class="close-btn" id="closeBtn">元气回归 ✨</button>
    <div class="forced-countdown" id="forcedCountdown" style="display:none;"></div>
  </div>

  <div class="hint" id="hint">点击任意位置或按 Esc 键关闭</div>

  <script>
    // Parse URL parameters
    const params = new URLSearchParams(window.location.search);
    const duration = parseInt(params.get('duration') || '30');
    const themeColor = params.get('theme') || '#E8F4F8';
    const forced = params.get('forced') === 'true';
    const severity = parseInt(params.get('severity') || '1');
    const eyeHealth = parseInt(params.get('eye_health') || '100');
    const totalSkipped = parseInt(params.get('total_skipped') || '0');
    const forcedMinDuration = Math.min(15, duration);

    // Background image elements
    const bgImageLayer = document.getElementById('bgImageLayer');
    const bgLoading = document.getElementById('bgLoading');

    // 4K background image pool from Unsplash
    const bgImagePool = [
      { url: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=3840&h=2160&fit=crop&q=85', author: 'Samuel Ferrara', link: 'https://unsplash.com/photos/1506905925346-21bda4d32df4' },
      { url: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=3840&h=2160&fit=crop&q=85', author: 'Lukasz Szmigiel', link: 'https://unsplash.com/photos/1470071459604-3b5ec3a7fe05' },
      { url: 'https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=3840&h=2160&fit=crop&q=85', author: 'Dave Hoefler', link: 'https://unsplash.com/photos/1441974231531-c6227db76b6e' },
      { url: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=3840&h=2160&fit=crop&q=85', author: 'Yucel Moran', link: 'https://unsplash.com/photos/1507525428034-b723cf961d3e' },
      { url: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=3840&h=2160&fit=crop&q=85', author: 'Benjamin Voros', link: 'https://unsplash.com/photos/1519681393784-d120267933ba' },
      { url: 'https://images.unsplash.com/photo-1439853949127-fa647821eba0?w=3840&h=2160&fit=crop&q=85', author: 'Jerry Zhang', link: 'https://unsplash.com/photos/1439853949127-fa647821eba0' },
      { url: 'https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=3840&h=2160&fit=crop&q=85', author: 'Samuel Ferrara', link: 'https://unsplash.com/photos/1472214103451-9374bd1c798e' },
      { url: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=3840&h=2160&fit=crop&q=85', author: 'Carl Nenzen Loven', link: 'https://unsplash.com/photos/1464822759023-fed622ff2c3b' },
      { url: 'https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=3840&h=2160&fit=crop&q=85', author: 'Yucel Moran', link: 'https://unsplash.com/photos/1475924156734-496f6cac6ec1' },
      { url: 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=3840&h=2160&fit=crop&q=85', author: 'Samuel Ferrara', link: 'https://unsplash.com/photos/1501785888041-af3ef285b470' },
      { url: 'https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=3840&h=2160&fit=crop&q=85', author: 'Olesia Bilkei', link: 'https://unsplash.com/photos/1505118380757-91f5f5632de0' },
      { url: 'https://images.unsplash.com/photo-1439066615861-d1af74d74000?w=3840&h=2160&fit=crop&q=85', author: 'Tracy Zhang', link: 'https://unsplash.com/photos/1439066615861-d1af74d74000' },
      { url: 'https://images.unsplash.com/photo-1448375240586-882707db888b?w=3840&h=2160&fit=crop&q=85', author: 'Khaled Ghareeb', link: 'https://unsplash.com/photos/1448375240586-882707db888b' },
      { url: 'https://images.unsplash.com/photo-1542273917363-3b1817f69a2d?w=3840&h=2160&fit=crop&q=85', author: 'David Marcu', link: 'https://unsplash.com/photos/1542273917363-3b1817f69a2d' },
      { url: 'https://images.unsplash.com/photo-1495616811223-4d98c6e9c869?w=3840&h=2160&fit=crop&q=85', author: 'Robert Lukeman', link: 'https://unsplash.com/photos/1495616811223-4d98c6e9c869' },
      { url: 'https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?w=3840&h=2160&fit=crop&q=85', author: 'Lukasz Szmigiel', link: 'https://unsplash.com/photos/1470252649378-9c29740c9fa8' },
      { url: 'https://images.unsplash.com/photo-1454496522488-7a8e488e8606?w=3840&h=2160&fit=crop&q=85', author: 'Jerry Zhang', link: 'https://unsplash.com/photos/1454496522488-7a8e488e8606' },
      { url: 'https://images.unsplash.com/photo-1486870591958-9b9d0d1dda99?w=3840&h=2160&fit=crop&q=85', author: 'Carl Nenzen Loven', link: 'https://unsplash.com/photos/1486870591958-9b9d0d1dda99' },
      { url: 'https://images.unsplash.com/photo-1462275646964-a0e3c11f18a6?w=3840&h=2160&fit=crop&q=85', author: 'Leilani Angel', link: 'https://unsplash.com/photos/1462275646964-a0e3c11f18a6' },
      { url: 'https://images.unsplash.com/photo-1490750967868-88aa4f44baee?w=3840&h=2160&fit=crop&q=85', author: 'Alexey Topolyanskiy', link: 'https://unsplash.com/photos/1490750967868-88aa4f44baee' },
      { url: 'https://images.unsplash.com/photo-1439405326854-014607f694d7?w=3840&h=2160&fit=crop&q=85', author: 'Grayson Smith', link: 'https://unsplash.com/photos/1439405326854-014607f694d7' },
      { url: 'https://images.unsplash.com/photo-1483354483454-4cd359948304?w=3840&h=2160&fit=crop&q=85', author: 'Juskteez', link: 'https://unsplash.com/photos/1483354483454-4cd359948304' },
      { url: 'https://images.unsplash.com/photo-1491002052546-bf38f186af56?w=3840&h=2160&fit=crop&q=85', author: 'David Marcu', link: 'https://unsplash.com/photos/1491002052546-bf38f186af56' },
    ];

    // Load background image with caching
    function loadBackgroundImage() {
      const cached = sessionStorage.getItem('eyecare_bg_image');
      const cachedAuthor = sessionStorage.getItem('eyecare_bg_author');
      const cachedLink = sessionStorage.getItem('eyecare_bg_link');
      const cachedIdx = sessionStorage.getItem('eyecare_bg_idx');

      const now = Date.now();
      const oneHour = 60 * 60 * 1000;

      if (cached && cachedAuthor && cachedLink && cachedIdx) {
        const age = now - parseInt(sessionStorage.getItem('eyecare_bg_time') || '0');
        if (age < oneHour) {
          applyBackground(cached, cachedAuthor, cachedLink);
          return;
        }
      }

      // Pick random image different from previous
      let idx = parseInt(cachedIdx || '-1');
      let newIdx;
      do {
        newIdx = Math.floor(Math.random() * bgImagePool.length);
      } while (newIdx === idx && bgImagePool.length > 1);
      idx = newIdx;

      const chosen = bgImagePool[idx];
      bgLoading.classList.add('show');

      const img = new Image();
      img.onload = function() {
        bgLoading.classList.remove('show');
        sessionStorage.setItem('eyecare_bg_image', chosen.url);
        sessionStorage.setItem('eyecare_bg_author', chosen.author);
        sessionStorage.setItem('eyecare_bg_link', chosen.link);
        sessionStorage.setItem('eyecare_bg_idx', idx.toString());
        sessionStorage.setItem('eyecare_bg_time', now.toString());
        applyBackground(chosen.url, chosen.author, chosen.link);
      };
      img.onerror = function() {
        bgLoading.classList.remove('show');
      };
      img.src = chosen.url;

      setTimeout(() => {
        if (!bgImageLayer.classList.contains('loaded')) {
          bgLoading.classList.remove('show');
        }
      }, 5000);
    }

    function applyBackground(url, author, link) {
      bgImageLayer.style.backgroundImage = `url(${url})`;
      void bgImageLayer.offsetWidth;
      bgImageLayer.classList.add('loaded');
      document.body.classList.add('has-bg-image');
    }

    loadBackgroundImage();

    // Parse skip history
    let skipHistory = [];
    try {
      const raw = params.get('skip_history') || '[]';
      // Decode base64url (Rust side uses URL_SAFE_NO_PAD)
      const padded = raw + '='.repeat((4 - raw.length % 4) % 4);
      const decoded = atob(padded.replace(/-/g, '+').replace(/_/g, '/'));
      skipHistory = JSON.parse(decoded);
    } catch(e) { /* ignore */ }

    // Set theme and severity class
    document.documentElement.style.setProperty('--bg-color', themeColor);
    if (severity >= 5) document.body.classList.add('severity-5');
    else if (severity >= 4) document.body.classList.add('severity-4');

    // ---- Eye Health Bar ----
    function updateHealthBar(health) {
      const bar = document.getElementById('healthBar');
      const emoji = document.getElementById('healthEmoji');
      const percent = document.getElementById('healthPercent');
      const detail = document.getElementById('healthDetail');

      bar.style.width = health + '%';
      percent.textContent = health + '%';

      // Remove all color classes
      bar.className = 'health-bar-fill';

      if (health > 65) {
        bar.classList.add('green');
        emoji.textContent = '👁️';
        detail.textContent = '状态良好，继续保持！';
      } else if (health > 45) {
        bar.classList.add('yellow');
        emoji.textContent = '😐';
        detail.textContent = '眼睛有点累了，记得多眨眼～';
      } else if (health > 25) {
        bar.classList.add('orange');
        emoji.textContent = '😧';
        detail.textContent = '眼睛很疲劳了！请立即休息！';
      } else if (health > 10) {
        bar.classList.add('red');
        emoji.textContent = '😵';
        detail.textContent = '警告：眼睛疲劳度已过高！';
      } else {
        bar.classList.add('dark');
        emoji.textContent = '💀';
        detail.textContent = '紧急！你的眼睛正在死去...';
        // Pulsing animation for critical health
        bar.style.animation = 'pulse 1s infinite';
      }
    }

    updateHealthBar(eyeHealth);

    // ---- Skip History ----
    const skipPanel = document.getElementById('skipPanel');
    const skipList = document.getElementById('skipList');
    if (skipHistory.length > 0) {
      skipPanel.style.display = 'block';
      skipHistory.forEach(record => {
        const li = document.createElement('li');
        const reasons = ['我在忙', '等一下', '马上就好', '再写5分钟', '稍后'];
        const reason = reasons[Math.floor(Math.random() * reasons.length)];
        const skippedSec = record.skipped_after || 30;
        li.innerHTML = `
          <span class="skip-time">${record.time}</span>
          <span class="skip-reason">"${reason}"</span>
          <span class="skip-lost">损失 ${skippedSec}s</span>
        `;
        skipList.appendChild(li);
      });
    }

    // ---- Damage Bill ----
    const damageBill = document.getElementById('damageBill');
    if (severity >= 3 && totalSkipped > 0) {
      damageBill.style.display = 'block';
      document.getElementById('damageSkippedTime').textContent = Math.floor(totalSkipped / 60) + '分钟';
      const fatigue = Math.min(99, Math.floor(eyeHealth <= 25 ? 95 : 50 + (100 - eyeHealth) * 0.5));
      document.getElementById('damageFatigue').textContent = fatigue + '%';
      const recovery = Math.max(5, Math.ceil(totalSkipped / 60 / 2));
      document.getElementById('damageRecovery').textContent = recovery + '分钟';
    }

    // ---- Forced Warning ----
    const closeBtn = document.getElementById('closeBtn');
    const forcedCountdown = document.getElementById('forcedCountdown');
    const hintEl = document.getElementById('hint');

    if (forced) {
      document.getElementById('forcedWarning').style.display = 'block';
      closeBtn.disabled = true;
      closeBtn.textContent = '请稍候...';
      forcedCountdown.style.display = 'block';
      hintEl.textContent = '强制休息期间无法关闭';
    }

    // ---- Interaction phases ----
    const interactions = [
      { time: 0, text: '👁️ 轻轻闭眼休息一下' },
      { time: 1, text: '👀 转动眼珠，顺时针3圈，逆时针3圈' },
      { time: 2, text: '🌿 远眺6米外的物体，让眼睛放松' }
    ];

    let remaining = duration;
    const countdownEl = document.getElementById('countdown');
    const interactionEl = document.getElementById('interactionText');
    interactionEl.textContent = interactions[0].text;

    const timer = setInterval(() => {
      remaining--;
      countdownEl.textContent = remaining;

      if (remaining > 0) {
        const phase = Math.floor((duration - remaining) / Math.max(1, Math.ceil(duration / 3)));
        if (phase < interactions.length) {
          interactionEl.textContent = interactions[phase].text;
        }
      }

      // Simulate health recovery during break
      const recoveredHealth = Math.min(100, eyeHealth + Math.floor((duration - remaining) * 2.5));
      updateHealthBar(recoveredHealth);

      if (forced) {
        const elapsed = duration - remaining;
        if (elapsed >= forcedMinDuration) {
          closeBtn.disabled = false;
          closeBtn.textContent = '元气回归 ✨';
          forcedCountdown.style.display = 'none';
          hintEl.textContent = '点击任意位置或按 Esc 键关闭';
        } else {
          const fRemaining = forcedMinDuration - elapsed;
          forcedCountdown.textContent = '还需等待 ' + fRemaining + ' 秒才能关闭';
        }
      }

      if (remaining <= 0) {
        clearInterval(timer);
        closeFullscreen(false);
      }
    }, 1000);

    // ---- Close handlers ----
    function closeFullscreen(early) {
      clearInterval(timer);
      const remainingVal = parseInt(document.getElementById('countdown').textContent) || 0;

      if (window.__TAURI__ && window.__TAURI__.core) {
        try {
          // Backend will close the window
          window.__TAURI__.core.invoke("on_fullscreen_closed", {
            early: early,
            remaining: remainingVal,
            breakDuration: duration
          }).catch(e => {
            console.error("Failed to notify backend:", e);
          });
        } catch (e) {
          console.error("Failed to notify backend:", e);
        }
      }
      // Don't call window.close() here - backend handles it
    }

    function canClose() {
      if (!forced) return true;
      const elapsed = duration - remaining;
      return elapsed >= forcedMinDuration;
    }

    closeBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      if (canClose()) closeFullscreen(remaining > 0);
    });

    document.body.addEventListener('click', () => {
      if (canClose()) closeFullscreen(remaining > 0);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && canClose()) closeFullscreen(remaining > 0);
    });
  </script>

  <!-- Pulse animation for critical health -->
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
</body>
</html>
